<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - FlashMall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .login-card { max-width: 400px; margin: 100px auto; }
        .brand { color: #ff4500; font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card card shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="brand">⚡ FlashMall</div>
                <p class="text-muted">高并发秒杀商城</p>
            </div>

            <!-- Tab 切换 -->
            <ul class="nav nav-tabs mb-3" id="authTab">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="switchTab('login')">登录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="switchTab('register')">注册</a>
                </li>
            </ul>

            <!-- 登录表单 -->
            <div id="login-form">
                <div class="mb-3">
                    <input type="text" id="login-username" class="form-control" placeholder="用户名">
                </div>
                <div class="mb-3">
                    <input type="password" id="login-password" class="form-control" placeholder="密码">
                </div>
                <button class="btn btn-danger w-100" onclick="login()">登录</button>
                <p class="text-muted small mt-2 text-center">测试账号：admin / hs0929</p>
            </div>

            <!-- 注册表单 -->
            <div id="register-form" style="display:none">
                <div class="mb-3">
                    <input type="text" id="reg-username" class="form-control" placeholder="用户名（3-20位字母数字）">
                </div>
                <div class="mb-3">
                    <input type="password" id="reg-password" class="form-control" placeholder="密码（6-20位）">
                </div>
                <div class="mb-3">
                    <input type="text" id="reg-nickname" class="form-control" placeholder="昵称（可选）">
                </div>
                <button class="btn btn-danger w-100" onclick="register()">注册</button>
            </div>

            <div id="alert-msg" class="mt-3" style="display:none"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function switchTab(tab) {
        document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
        document.querySelectorAll('#authTab .nav-link').forEach((el, i) => {
            el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
    }

    function showAlert(msg, type = 'danger') {
        const el = document.getElementById('alert-msg');
        el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        el.style.display = '';
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!username || !password) { showAlert('请填写用户名和密码'); return; }

        const res = await fetch('/api/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.code === 200) {
            localStorage.setItem('accessToken', data.data.accessToken);
            localStorage.setItem('username', data.data.username);
            localStorage.setItem("nickname", data.data.nickname);
            showAlert('登录成功，正在跳转...', 'success');
            setTimeout(() => window.location.href = '/', 800);
        } else {
            showAlert(data.message);
        }
    }

    async function register() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        const nickname = document.getElementById('reg-nickname').value.trim();
        if (!username || !password) { showAlert('请填写用户名和密码'); return; }

        const res = await fetch('/api/user/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, nickname })
        });
        const data = await res.json();
        if (data.code === 200) {
            showAlert('注册成功，请登录', 'success');
            switchTab('login');
        } else {
            showAlert(data.message);
        }
    }

    // 回车提交
    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
