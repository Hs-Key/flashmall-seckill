server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: flashmall

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/flashmall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:           # 无密码留空
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 生产者消息确认（防止消息丢失）
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        # 手动 ACK（防止消息丢失）
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 1.5
          max-interval: 10000ms
        # 每次只取1条消息，保证串行处理（防超卖关键）
        prefetch: 1

  # Thymeleaf
  thymeleaf:
    cache: false
    encoding: UTF-8

  # 序列化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.flashmall
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: flashmall-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-ttl: 7200        # access token 有效期：2小时（秒）
  refresh-ttl: 604800     # refresh token 有效期：7天（秒）

# 秒杀配置
seckill:
  order-timeout: 1800000  # 订单超时时间：30分钟（毫秒）

# 日志
logging:
  level:
    com.flashmall: debug
    org.springframework.amqp: info
