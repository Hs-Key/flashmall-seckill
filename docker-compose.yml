version: '3.8'

services:
  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: flashmall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: flashmall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - flashmall-mysql-data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: flashmall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - flashmall-redis-data:/data
    command: redis-server --save 60 1 --loglevel warning

  # RabbitMQ 3 (带管理界面)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flashmall-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP 协议端口
      - "15672:15672"  # 管理界面端口

volumes:
  flashmall-mysql-data:
  flashmall-redis-data:
